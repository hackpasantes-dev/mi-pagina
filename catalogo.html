<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix</title>

  <link rel="stylesheet" href="catlogo.css">

  <!--  PLYR CSS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/previews/017/396/814/original/netflix-mobile-application-logo-free-png.png">
</head>
<body>

<header class="navbar">
  <div class="left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png" class="logo">

    <div class="menu-toggle" id="menuToggle">
      ☰
    </div>

    <nav id="menu">
      <a href="#">Inicio</a>
      <a href="#">Series TV</a>
      <a href="#">Películas</a>
      <a href="#">Mi lista</a>
    </nav>
  </div>

  <div class="right">
    <button id="logout">Cerrar sesión</button>
  </div>
</header>

<main>

  <!-- 🎬 HERO -->
  <section id="hero" class="hero">
    <div class="hero-info">
      <h1 id="heroTitulo"></h1>
      <p id="heroDescripcion"></p>
      <button id="heroPlay">▶ Reproducir</button>
    </div>
  </section>

  <!-- 🔥 TOP 10 -->
  <div class="fila">
    <h2>Top 10 en tu país</h2>
    <div class="contenedor top10" id="top10"></div>
  </div>

  <!-- 🎞️ POPULARES -->
  <div class="fila">
    <h2>Populares</h2>
    <div class="contenedor" id="peliculas"></div>
  </div>

</main>

<!-- 🎬 MODAL VIDEO PRO -->
<div id="modal" class="modal">
  <div class="modal-content">

    <button id="cerrar" class="btn-cerrar">Salir</button>

    <!-- 🔥 VIDEO PARA PLYR -->
    <video id="modalVideo" playsinline></video>

  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 🔥 PLYR JS -->
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<!-- TU JS -->
<script src="catalogo.js"></script>

</body>
</html>
